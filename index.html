<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>TrendStats.ai</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f1a;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 60px;
      font-size: 42px;
      background: linear-gradient(to right, #6a5cff, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    button {
      margin-top: 30px;
      padding: 15px 35px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(to right, #4f46e5, #9333ea);
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      opacity: 0.85;
    }

    #result {
      margin: 40px auto;
      width: 85%;
      max-width: 750px;
      background: #1a1a2e;
      padding: 25px;
      border-radius: 15px;
      text-align: left;
      white-space: pre-wrap;
      font-size: 16px;
    }
  </style>
</head>

<body>

  <h1>TRENDSTATS.AI</h1>

  <button onclick="getTrends()">Trendleri Analiz Et</button>

  <div id="result">Henüz veri yok...</div>

  <script>
    async function getTrends() {
      const resultDiv = document.getElementById("result");
      resultDiv.innerText = "taranıyor...";

      try {
        const res = await fetch("https://trendstats-api.muratk-gsb.workers.dev/api/trends/all");
        const data = await res.json();

        resultDiv.innerText = data.insight || "Veri geldi ama boş";
      } catch (err) {
        resultDiv.innerText = "API hata verdi 😢";
      }
    }
  </script>

</body>
</html>
